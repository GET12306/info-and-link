#     - "2026-08-12"
#   title:                             # [必填] 活动标题
#     ja: "活动名"
#     en: "Activity title"
#   description:                       # [可选] 角色、场地、出演场次等补充信息
#     ja: "ゲスト出演"
#     en: "Guest appearance"
#   link: "https://example.com/event" # [必填] 活动标题链接；也是票务链接的最终回退地址
#   ticketInfo:                        # [可选] 仅有票务信息时添加
#     venue:                           # [可选] 票务页显示的场地
#       ja: "会場名"
#       en: "Venue"
#     officialUrl: "https://example.com/tickets" # [可选] 各票种未设 link 时的回退地址
#     entries:                         # [必填/仅 ticketInfo 内] 一个或多个票务阶段
